# Render deployment profile
# Overrides for cloud deployment on Render

# Use PORT environment variable assigned by Render
server.port=${PORT:8080}

# Database - same H2 file mode (will persist within the container)
# For production scale, switch to a managed PostgreSQL/MySQL instance
spring.datasource.url=jdbc:h2:file:./data/hiphophub;AUTO_SERVER=TRUE

# Disable H2 console in production
spring.h2.console.enabled=false

# Don't show SQL in production logs
spring.jpa.show-sql=false

# Last.fm API keys — set via Render environment variables
lastfm.api.key=${LASTFM_API_KEY:}
lastfm.api.secret=${LASTFM_API_SECRET:}

# Allow Vercel frontend origin
cors.allowed.origins=http://localhost:3000,http://localhost:5173,https://*.vercel.app
