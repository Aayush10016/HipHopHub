# Spring Application Name
spring.application.name=hiphophub-backend

# Server Configuration
server.port=8080

# Database Configuration (H2 file mode for persistent local data)
spring.datasource.url=jdbc:h2:file:./data/hiphophub;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Last.fm API (artist bios, tags, images)
# Do NOT commit real keys. Override in application-local.properties (gitignored).
lastfm.api.key=
lastfm.api.secret=
lastfm.api.url=https://ws.audioscrobbler.com/2.0/

# iTunes API (preview URLs + album art)
itunes.api.url=https://itunes.apple.com/search

# Deezer API (artist photos + fan count fallback)
deezer.api.url=https://api.deezer.com

# JWT Configuration
jwt.secret=HipHopHub_Super_Secret_Key_For_JWT_Token_Generation_2026
jwt.expiration=86400000

# CORS Configuration
cors.allowed.origins=http://localhost:3000,http://localhost:5173

# Live news feed does not require paid LLM keys.

# Allow local override for secrets without committing
spring.config.import=optional:classpath:application-local.properties

# News API (NewsAPI.org) configuration
news.api.key=3ebfddc0240a443fbac378961816a0fe
news.api.url=https://newsapi.org/v2/everything
news.api.query=desi hip hop OR indian hip hop OR rap india OR seedhe maut OR raftaar OR kr$na OR divine OR emiway
news.api.domains=thequint.com,indiatoday.in,rollingstoneindia.com,mid-day.com,firstpost.com,indiatimes.com,thenewsminute.com

# App toggles
app.seed.enabled=true

# Disable legacy test data populator by default
app.testdata.enabled=false

# Music import tuning
music.import.track.limit=200
music.import.seed.delay.ms=100

# Tour sync (free Songkick scrape, no API key)
tour.sync.enabled=true
tour.sync.interval.hours=6
tour.sync.max.artists=20
tour.sync.max.events.per.artist=6
